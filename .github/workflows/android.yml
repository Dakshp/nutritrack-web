# Builds a signed Android APK from the web app using Capacitor, and attaches
# it to a GitHub release for easy download on the phone.
#
# The APK is always signed with signing/release.keystore (see signing/README.md),
# so every build can install over the previous one without uninstalling.
# versionCode comes from the workflow run number, which only ever increases.
name: android-apk

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - '*.js'
      - '*.html'
      - '*.css'
      - 'manifest.webmanifest'
      - 'icons/**'
      - 'package.json'
      - 'capacitor.config.json'
      - 'signing/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Capacitor
        run: npm install --no-audit --no-fund

      - name: Stage web assets
        run: |
          mkdir -p www/icons
          cp index.html app.js storage.js style.css sw.js manifest.webmanifest www/
          cp icons/*.png www/icons/

      - name: Generate Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Set version from run number
        run: |
          sed -i "s/versionCode 1$/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"$/versionName \"1.3.${{ github.run_number }}\"/" android/app/build.gradle
          grep -E 'versionCode|versionName' android/app/build.gradle

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true

      - name: Build release APK
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)"
          "$BT/zipalign" -f -p 4 android/app/build/outputs/apk/release/app-release-unsigned.apk NutriTrack.apk
          "$BT/apksigner" sign --ks signing/release.keystore --ks-pass pass:nutritrack-release --ks-key-alias nutritrack NutriTrack.apk
          "$BT/apksigner" verify --print-certs NutriTrack.apk

      - name: Publish release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="android-v${{ github.run_number }}"
          gh release create "$TAG" NutriTrack.apk \
            --title "NutriTrack Android v1.3.${{ github.run_number }}" \
            --target "${{ github.sha }}" \
            --notes "Signed APK built from \`${{ github.ref_name }}\` (${{ github.sha }}). Same signing key as every other release from this workflow, so it installs over previous versions without uninstalling."
